version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "7073:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "7072:8000"
    environment:
      - MAX_UPLOAD_SIZE=52428800
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/version')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
