# /etc/nginx/sites-available/mbeditor
# Managed by repo: deploy/nginx/mbeditor.conf
#
# TLS materials are issued and rotated by certbot at:
#   /etc/letsencrypt/live/mbeditor.mbluostudio.com/{fullchain,privkey}.pem
# Certbot's systemd timer renews them in-place without editing this file.
#
# Zone availability (checked 2026-04-21):
#   /etc/nginx/nginx.conf defines: limit_req_zone general 30r/s, api 10r/s, limit_conn_zone conn_limit.
#   These zones are intentionally NOT used here to match the plan-authored template and keep the
#   vhost minimal; revisit if production load justifies reusing them.

server {
    listen 80;
    listen [::]:80;
    server_name mbeditor.mbluostudio.com;

    # ACME challenge root is shared with certbot's default; 301 everything else.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://mbeditor.mbluostudio.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mbeditor.mbluostudio.com;

    ssl_certificate /etc/letsencrypt/live/mbeditor.mbluostudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mbeditor.mbluostudio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (mirror mbluostudio.com).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Large enough for a 50 MB image upload (backend MAX_UPLOAD_SIZE).
    client_max_body_size 55M;

    # Everything proxies to the frontend container; the frontend's embedded
    # nginx forwards /api/ and /images/ to the backend via the compose network.
    location / {
        proxy_pass http://127.0.0.1:7073;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-safe even though prod has no HMR.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
