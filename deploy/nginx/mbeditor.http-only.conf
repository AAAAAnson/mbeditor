# Temporary HTTP-only vhost for certbot first-issue.
# After certbot runs successfully, this is replaced by deploy/nginx/mbeditor.conf.
server {
    listen 80;
    listen [::]:80;
    server_name mbeditor.mbluostudio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://mbeditor.mbluostudio.com$request_uri;
    }
}
